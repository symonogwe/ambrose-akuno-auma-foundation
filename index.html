<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var d = document.documentElement;
          var mode = localStorage.getItem('color-mode');
          if (mode === 'dark') {
            d.classList.add('dark');
            d.style.backgroundColor = '#0A1628';
          } else {
            d.style.backgroundColor = '#FFFFFF';
          }
          d.style.border = 'none';
          d.style.outline = 'none';
          d.style.outlineColor = 'transparent';
          document.body && (document.body.style.border = 'none');
          document.body && (document.body.style.outline = 'none');
        } catch(e) {}
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #FFFFFF;
        min-height: 100vh;
        border: none;
        outline: none;
      }
      html.dark,
      html.dark body {
        background-color: #0A1628;
      }
      #root {
        background-color: #FFFFFF;
        min-height: 100vh;
        border: none;
        outline: none;
      }
      html.dark #root {
        background-color: #0A1628;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambrose Akuno Auma Foundation</title>
    <!-- Google Fonts: Inter (body) + Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
